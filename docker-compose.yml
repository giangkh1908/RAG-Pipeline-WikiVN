services:
  # ============================================
  # Qdrant vector database
  # ============================================
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  # ============================================
  # One-time indexer: populates Qdrant on first deploy
  # ============================================
  indexer:
    build: .
    image: ghcr.io/giangkh1908/rag-pipeline-wikivn:latest
    container_name: rag-indexer
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - rag_data:/app/data
    depends_on:
      - qdrant
    command: >
      sh -c "echo 'Waiting for Qdrant...'; until curl -fsS http://qdrant:6333/healthz >/dev/null 2>&1; do sleep 2; done; echo 'Qdrant ready'; python scripts/init_deployment.py"
    restart: "no"

  # ============================================
  # RAG API + Frontend
  # ============================================
  api:
    build: .
    image: ghcr.io/giangkh1908/rag-pipeline-wikivn:latest
    container_name: rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      # Persist query-cache updates to SQLite across restarts.
      # On first run Docker initializes the volume with files from the image.
      - rag_data:/app/data
    depends_on:
      qdrant:
        condition: service_started
      indexer:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  qdrant_storage:
  rag_data:
