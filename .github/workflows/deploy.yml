name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/giangkh1908/rag-pipeline-wikivn
  DOMAIN: wikivn.top

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/rag

            # Pull the latest code and compose file
            git pull

            # Ensure .env exists
            if [ ! -f .env ]; then
              echo "OPENROUTER_API_KEY=your-key-here" > .env
              echo "QDRANT_URL=http://qdrant:6333" >> .env
              echo "WARNING: /opt/rag/.env was missing. Please edit it with your API keys."
            fi

            # Rebuild and restart services
            docker compose down
            docker compose up -d --build

            # Cleanup old images
            docker image prune -f

            # Wait for API to become healthy
            echo "Waiting for API to be healthy..."
            api_healthy=0
            for i in $(seq 1 180); do
              if curl -fsS http://localhost:8000/api/health > /dev/null 2>&1; then
                echo "API is healthy"
                api_healthy=1
                break
              fi
              if [ $((i % 12)) -eq 0 ]; then
                echo "  ...still waiting ($((i * 5))s elapsed)"
              fi
              sleep 5
            done

            if [ "$api_healthy" -ne 1 ]; then
              echo "ERROR: API did not become healthy within 15 minutes"
              echo "--- Qdrant logs ---"
              docker logs rag-qdrant --tail 50
              echo "--- Indexer logs ---"
              docker logs rag-indexer --tail 100
              echo "--- API logs ---"
              docker logs rag-api --tail 100
              exit 1
            fi

            echo "Deployed! https://${{ env.DOMAIN }}"
