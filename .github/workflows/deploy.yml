name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/giangkh1908/rag-pipeline-wikivn
  DOMAIN: wikivn.top

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            mkdir -p /opt/rag
            cd /opt/rag

            # Always download the latest compose file from the repo
            wget -q -O docker-compose.yml https://raw.githubusercontent.com/giangkh1908/RAG-Pipeline-WikiVN/main/docker-compose.yml

            # Create .env if it does not exist
            if [ ! -f .env ]; then
              echo "OPENROUTER_API_KEY=your-key-here" > .env
              echo "QDRANT_URL=http://qdrant:6333" >> .env
              echo "COHERE_API_KEY=your-key-here" >> .env
              echo "Please edit /opt/rag/.env with your API keys"
            fi

            # Login GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the latest image
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Restart services
            docker compose down
            docker compose up -d

            # Cleanup old images
            docker image prune -f

            # Health check (indexer may take several minutes on first deploy)
            echo "Waiting for API to be healthy..."
            for i in $(seq 1 180); do
              if curl -fsS http://localhost:8000/api/health > /dev/null 2>&1; then
                echo "API is healthy"
                break
              fi
              sleep 5
            done

            echo "Deployed! https://${{ env.DOMAIN }}"
